{% extends 'base.html' %}

{% block content %}
<div class="content-card shadow-sm p-5 mx-auto" style="max-width: 450px; margin-top: 50px;">
    <h2 class="text-center mb-4">Регистрация</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-warning py-2 small border-0">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">ПРИДУМАЙТЕ ЛОГИН</label>
            <input type="text" name="username" class="form-control" placeholder="Имя пользователя" autocomplete="off" required>
        </div>
        <div class="mb-4">
            <label class="form-label">ПРИДУМАЙТЕ ПАРОЛЬ</label>
            <input type="password" name="password" class="form-control" placeholder="Пароль" autocomplete="off" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">СОЗДАТЬ АККАУНТ</button>
    </form>

    <div class="text-center mt-4">
        <p class="text-muted small">Уже есть аккаунт? <a href="/login" class="text-primary fw-bold text-decoration-none">Войти</a></p>
    </div>
</div>
{% endblock %}
