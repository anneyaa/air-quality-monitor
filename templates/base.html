<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/" style="letter-spacing: -1px;">AIR MONITOR</a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">ГЛАВНАЯ</a>

                {% if session.get('user') %}
                    <a class="nav-link" href="/compare">СРАВНЕНИЕ</a>
                    <a class="nav-link" href="/sort">АНАЛИЗ</a>
                    <a class="nav-link" href="/graph">ГРАФИКИ</a>

                    <!-- Имя пользователя и кнопка выхода -->
                    <span class="nav-link text-info fw-bold ms-lg-3">{{ session['user'] }}</span>
                    <a class="nav-link text-danger" href="/logout">ВЫХОД</a>
                {% else %}
                    <a class="nav-link ms-lg-3" href="/login">ВХОД</a>
                    <a class="nav-link" href="/register">РЕГИСТРАЦИЯ</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl)
            })
        })
    </script>
</body>
</html>
